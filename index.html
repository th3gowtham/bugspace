<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BugSpace – Discover and Track Bug Bounty Programs in Real Time</title>
    <meta name="description" content="BugSpace helps security researchers discover new bug bounty programs, track rewards, and monitor updates across platforms in real time." />
    <meta name="keywords" content="bug bounty, bug bounty programs, hackerone alternative, bugcrowd programs, security researcher tools, vulnerability hunting" />

    <meta name="robots" content="index, follow" />

    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="BugSpace – Bug Bounty Intelligence Platform" />

    <meta property="og:type" content="website" />

    <meta property="og:image" content="https://bugspace.in/preview.png" />

    <!-- Twitter Card -->

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BugSpace",
      "url": "https://bugspace.in",
      "description": "BugSpace helps security researchers discover bug bounty programs and track rewards across platforms.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://bugspace.in/browse?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
